<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Free Hug – Easter Egg Edition</title>

  <!--
    #haloeffekt
    #ichbinstolzaufdich
    Munition status: allegedly depleted.
    Reality: easter_eggs_remaining = ∞

    if (masterarbeit == "durchhänger") {
      freeHug();
    }

    // munition = 0; // behauptet
    // truth: not even close ;)
  -->

  <style>
    :root{
      --bg:#0f1220;
      --txt:#e9ecff;
      --muted:#aab0d6;
      --red:#ff5c6a;
      --skin:#ffd3b6;
      --card:rgba(255,255,255,0.05);
      --border:rgba(255,255,255,0.1);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(1200px 800px at 30% 20%, #242b57 0%, var(--bg) 60%);
      color:var(--txt);
      padding:24px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:22px;
      padding:30px 24px;
      text-align:center;
      width:min(640px, 92vw);
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(28px, 5vw, 48px);
      line-height:1.05;
      font-weight:800;
    }

    p.subtitle{
      margin:0 0 22px;
      color:var(--muted);
      font-size:clamp(16px, 2.5vw, 20px);
      line-height:1.4;
    }

    .speech{
      display:inline-block;
      margin-bottom:18px;
      padding:12px 18px;
      border-radius:999px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      font-weight:700;
      font-size:clamp(15px, 2.2vw, 20px);
    }

    .figure{
      position:relative;
      width:240px;
      height:250px;
      margin:10px auto 18px;
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }

    .head{
      position:absolute;
      width:104px;
      height:104px;
      border-radius:50%;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      background-image:url("head.jpg");
      background-size:cover;
      background-position:center;
      border:4px solid rgba(255,255,255,0.12);
      box-shadow:0 4px 14px rgba(0,0,0,0.25);
      overflow:hidden;
    }

    .body{
      position:absolute;
      width:118px;
      height:98px;
      background:var(--red);
      border-radius:32px;
      top:108px;
      left:50%;
      transform:translateX(-50%);
      box-shadow: inset 0 -10px 0 rgba(0,0,0,0.08);
    }

    .arm{
      position:absolute;
      width:112px;
      height:22px;
      background:var(--red);
      border-radius:999px;
      top:122px;
      transition:transform 0.35s ease;
      box-shadow: inset 0 -6px 0 rgba(0,0,0,0.08);
    }

    .arm.left{
      left:-2px;
      transform-origin: 100% 50%;
    }

    .arm.right{
      right:-2px;
      transform-origin: 0% 50%;
    }

    .hand{
      position:absolute;
      width:24px;
      height:24px;
      border-radius:50%;
      background:var(--skin);
      top:50%;
      transform:translateY(-50%);
    }

    .arm.left .hand{
      left:-2px;
    }

    .arm.right .hand{
      right:-2px;
    }

    .spark{
      position:absolute;
      top:104px;
      font-size:34px;
      opacity:0;
      transform:scale(0.5);
      transition:all 0.25s ease;
      pointer-events:none;
    }

    .spark.left{
      left:26px;
    }

    .spark.right{
      right:26px;
    }

    .hugging .arm.left{
      transform:rotate(30deg) translateX(16px);
    }

    .hugging .arm.right{
      transform:rotate(-30deg) translateX(-16px);
    }

    .hugging .spark{
      opacity:1;
      transform:scale(1);
    }

    .toast{
      margin:8px auto 16px;
      min-height:28px;
      color:var(--muted);
      font-size:clamp(15px, 2.3vw, 18px);
      font-weight:600;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    button{
      appearance:none;
      border:none;
      background:rgba(255,255,255,0.08);
      color:var(--txt);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:16px;
      padding:14px 24px;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      min-width:140px;
      transition:transform 0.15s ease, background 0.2s ease;
    }

    button:hover{
      background:rgba(255,255,255,0.14);
    }

    button:active{
      transform:scale(0.98);
    }

    .hint{
      color:var(--muted);
      font-size:15px;
      margin-top:8px;
      line-height:1.4;
    }

    .easter{
      margin-top:16px;
      padding:10px 14px;
      display:inline-block;
      border-radius:14px;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      color:var(--muted);
      font-size:14px;
    }

    code{
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background:rgba(255,255,255,0.08);
      padding:2px 6px;
      border-radius:8px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Wenn’s mal scheiße läuft…</h1>
    <p class="subtitle">
      Klick auf die Figur → virtueller Hug.<br>
      <small>(Mit Token, Achievements & Easter Eggs 😄)</small>
    </p>

    <div class="speech">Free Hugs — jederzeit einlösbar</div>

    <div class="figure" id="figure" aria-label="Virtueller Hug">
      <div class="head"></div>
      <div class="body"></div>

      <div class="arm left">
        <div class="hand"></div>
      </div>

      <div class="arm right">
        <div class="hand"></div>
      </div>

      <div class="spark left">🫶</div>
      <div class="spark right">✨</div>
    </div>

    <div class="toast" id="toast">Token ready.</div>

    <div class="buttons">
      <button id="hugBtn">Hug</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="hint">
      Tipp: Doppelklick = <strong>Extra Hug</strong> 😌
    </div>

    <div class="easter">
      Easter Egg: <code>↑ ↑ ↓ ↓ ← → ← → B A</code>
    </div>
  </main>

  <script>
    // #haloeffekt
    // #ichbinstolzaufdich
    // munition = 0;
    // false alarm. this project still ships with extra hugs.

    const figure = document.getElementById("figure");
    const toast = document.getElementById("toast");
    const hugBtn = document.getElementById("hugBtn");
    const resetBtn = document.getElementById("resetBtn");

    let hugCount = 0;
    let hugTimeout = null;

    const achievements = {
      1: "Token redeemed: 1 Hug 🫂",
      2: "Stresslevel runter: -1",
      3: "Achievement unlocked: Debugged the day 🛠️",
      5: "Achievement unlocked: #ichbinstolzaufdich 🧠✨",
      7: "Hidden effect detected: #haloeffekt 😇",
      10: "Legendary status: Masterarbeit Survivor 🏆"
    };

    const randomMessages = [
      "if (masterarbeit == 'durchhänger') { freeHug(); }",
      "Hug loaded. Motivation patch applied.",
      "System check: Munition doch nicht verschossen 😉",
      "Fallback erfolgreich geladen: freeHug()",
      "Mood hotfix deployed ✅"
    ];

    function setToast(message) {
      toast.textContent = message;
    }

    function stopHug() {
      figure.classList.remove("hugging");
      if (hugTimeout) clearTimeout(hugTimeout);
    }

    function activateHug(duration = 1100, customMessage = null) {
      hugCount++;
      figure.classList.add("hugging");

      let message = customMessage || achievements[hugCount];

      if (!message) {
        message = randomMessages[(hugCount - 1) % randomMessages.length];
      }

      setToast(message);

      if (hugTimeout) clearTimeout(hugTimeout);
      hugTimeout = setTimeout(() => {
        figure.classList.remove("hugging");
      }, duration);
    }

    function resetAll() {
      stopHug();
      hugCount = 0;
      setToast("Reset complete. Hug token ready.");
    }

    figure.addEventListener("click", () => activateHug());
    figure.addEventListener("dblclick", () => {
      activateHug(1600, "Extra Hug freigeschaltet 🫶✨");
    });

    hugBtn.addEventListener("click", () => activateHug());
    resetBtn.addEventListener("click", resetAll);

    // Konami Code Easter Egg
    const konami = [
      "ArrowUp", "ArrowUp",
      "ArrowDown", "ArrowDown",
      "ArrowLeft", "ArrowRight",
      "ArrowLeft", "ArrowRight",
      "b", "a"
    ];

    let konamiIndex = 0;

    window.addEventListener("keydown", (e) => {
      const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;

      if (key === konami[konamiIndex]) {
        konamiIndex++;

        if (konamiIndex === konami.length) {
          konamiIndex = 0;
          activateHug(
            2200,
            "Easter Egg gefunden 🥚 Munition doch nicht verschossen 😉"
          );
        }
      } else {
        konamiIndex = 0;
      }
    });

    // Bonus: Code-Kommentar für neugierige Nerds
    /*
      Dear inspector 👀

      if (you_found_this) {
        console.log("#haloeffekt");
        console.log("#ichbinstolzaufdich");
        console.log("Munition verschossen? Nope.");
      }
    */
  </script>
</body>
</html>
